services:
  - type: web
    name: sf-cockpit-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SF_INSTANCE_URL
        sync: false
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      - key: SF_USERNAME
        sync: false
      - key: SF_PASSWORD
        sync: false
      - key: SF_SECURITY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: sf-cockpit-mcp
    runtime: node
    rootDir: mcp-server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SF_INSTANCE_URL
        sync: false
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      - key: SF_USERNAME
        sync: false
      - key: SF_PASSWORD
        sync: false
      - key: MCP_API_KEY
        sync: false
